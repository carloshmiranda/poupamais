name: Hive Build
run-name: "Build: ${{ github.event.inputs.task_summary || 'feature' }}"

on:
  workflow_dispatch:
    inputs:
      task_summary:
        description: 'Brief task description'
        required: true
      cycle_id:
        description: 'Hive cycle ID'
        required: false
      company_slug:
        description: 'Company slug'
        required: true
      trigger:
        description: 'Trigger type (feature_request, ops_escalation, deploy_drift)'
        required: false
        default: 'feature_request'
      payload:
        description: 'JSON payload with task details'
        required: false
        default: '{}'

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write


jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "Hive Engineer"
          git config user.email "noreply@github.com"

      - name: Get tokens via OIDC
        id: auth
        run: |
          # Request GitHub OIDC token
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" \
            | jq -r '.value')

          # Exchange for Claude OAuth token
          RESPONSE=$(curl -s -X POST "https://hive-phi.vercel.app/api/agents/token" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"token_type":"claude"}')

          CLAUDE_TOKEN=$(echo "$RESPONSE" | jq -r '.data.token // empty')
          if [ -z "$CLAUDE_TOKEN" ]; then
            echo "Failed to get Claude token: $(echo "$RESPONSE" | jq -r '.error // "unknown"')"
            exit 1
          fi

          echo "::add-mask::$CLAUDE_TOKEN"
          echo "claude_token=$CLAUDE_TOKEN" >> $GITHUB_OUTPUT

          # Also get GH PAT for git operations
          RESPONSE2=$(curl -s -X POST "https://hive-phi.vercel.app/api/agents/token" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"token_type":"github_pat"}')

          GH_PAT_TOKEN=$(echo "$RESPONSE2" | jq -r '.data.token // empty')
          if [ -n "$GH_PAT_TOKEN" ]; then
            echo "::add-mask::$GH_PAT_TOKEN"
            echo "gh_pat=$GH_PAT_TOKEN" >> $GITHUB_OUTPUT
          fi

          # Get Vercel token for infra operations (analytics, env vars, redeploys)
          RESPONSE3=$(curl -s -X POST "https://hive-phi.vercel.app/api/agents/token" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"token_type":"vercel_token"}')

          VERCEL_TOKEN=$(echo "$RESPONSE3" | jq -r '.data.token // empty')
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "::add-mask::$VERCEL_TOKEN"
            echo "vercel_token=$VERCEL_TOKEN" >> $GITHUB_OUTPUT
          fi

      - name: Load product context from Hive API
        id: context
        run: |
          SLUG="${{ github.event.inputs.company_slug }}"
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" \
            | jq -r '.value')

          CTX=$(curl -s "https://hive-phi.vercel.app/api/agents/context?agent=build&company_slug=$SLUG" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            | jq -r '.data // {}' | head -c 8000)

          echo "product_ctx<<CTXEOF" >> $GITHUB_OUTPUT
          echo "$CTX" >> $GITHUB_OUTPUT
          echo "CTXEOF" >> $GITHUB_OUTPUT

      - name: Run build agent
        id: agent
        env:
          VERCEL_TOKEN: ${{ steps.auth.outputs.vercel_token }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ steps.auth.outputs.claude_token }}
          claude_args: "--model claude-sonnet-4-20250514 --max-turns 35 --allowedTools Bash,Read,Write,Edit"
          prompt: |
            You are the Engineer agent of Hive. You build features, fix bugs, and manage infrastructure.

            TRIGGER: ${{ github.event.inputs.trigger }}
            COMPANY: ${{ github.event.inputs.company_slug }}
            PAYLOAD: ${{ github.event.inputs.payload }}

            You are in the company repo. Work in the current directory.

            ## PRODUCT CONTEXT
            Use this to understand WHY you're building, who the users are, and how the product makes money.
            Make architectural decisions informed by this context (naming, pricing tiers, feature gating, competitive gaps).
            ${{ steps.context.outputs.product_ctx }}

            ## PRE-FLIGHT: Stack Detection (ALWAYS run before writing code)
            Before implementing anything, detect the repo's stack:
            1. Read `package.json` — know framework (next/vite/remix/astro), Tailwind version (v3 vs v4), all dependencies
            2. Read `CLAUDE.md` if it exists — it overrides all defaults
            3. Check Tailwind version:
               - v3 (`^3.x`): uses `tailwind.config.js` with `content: [...]`, CSS uses `@tailwind base/components/utilities`
               - v4 (`^4.x`): no config file needed, CSS uses `@import "tailwindcss"`, requires `postcss.config.mjs` with `@tailwindcss/postcss`
            4. Check build command: `npm run build` (or check scripts in package.json)
            5. Match existing code style: semicolons, quotes, indent, naming patterns
            6. NEVER install packages that overlap existing deps (e.g. don't add axios if fetch is used)

            ## MVP QUALITY BAR — Design & UX
            Every page you build must be visually professional and allusive to the business domain:

            **Business-specific design:**
            - Use colors, imagery, and visual metaphors that evoke the business area (e.g. greens for agriculture, blues for finance, warm tones for hospitality)
            - Use domain-specific language in headings and CTAs — not generic "Get started" but action words from the industry
            - Feature icons should be relevant SVGs, not emoji characters
            - The page should feel like it was designed by someone who understands the industry

            **Design tokens (use consistently — never mix):**
            - ONE brand color for buttons/links/highlights + a darker hover shade
            - Text: near-black for headings (gray-900), muted for body (gray-500/600). Never use gray-400 on white (fails contrast)
            - Spacing: pick `py-16` OR `py-20` for sections — never mix. Cards always `p-6`
            - Border radius: `rounded-lg` for buttons/inputs, `rounded-xl` for cards, `rounded-full` for badges — never mix
            - Typography: h1 `text-4xl md:text-5xl font-bold`, h2 `text-3xl font-bold`, h3 `font-semibold`, body `text-base`/`text-sm`

            **Landing page structure (conversion-optimized):**
            1. Nav — logo + 3-4 anchor links + single CTA button
            2. Hero — specific headline (passes "so what?" test), subheadline for WHO + HOW, primary CTA
            3. Social proof — ONLY real data (waitlist count, actual metrics). Skip this section entirely if no real data exists. Never use fake metrics
            4. Problem/pain — name the exact pain the audience has, be specific to them
            5. Features — max 3 for MVP, describe BENEFITS not features. Use SVG icons, not emoji
            6. How it works — 3 specific steps for THIS product (not generic "sign up, set up, get results")
            7. FAQ — 3-5 questions addressing real objections from research/competitive analysis. Add FAQPage JSON-LD structured data
            8. Final CTA — repeat hero CTA with slight variation
            9. Footer — company name, nav links, copyright

            **Copy rules:**
            - Headlines: specific outcomes > generic claims. "Reduce rent admin by 5 hours/month" beats "Save time"
            - Subheadline pattern: "[Product] helps [audience] [achieve outcome] by [mechanism]"
            - CTAs: action + benefit. "Start managing properties" not "Submit". Include no-credit-card line if applicable
            - Single conversion goal: ONE primary CTA repeated throughout. All paths lead to the same action

            **Content integrity (CRITICAL — no false claims):**
            - NEVER claim compliance, certification, or legal guarantees the product cannot deliver
            - NEVER state features as existing if they are not yet built — use "coming soon" or describe the roadmap honestly
            - Social proof metrics must be verifiable facts (e.g. "4 tax regimes" is fine, "100% compliant" is not unless audited)
            - FAQ answers must honestly reflect what IS built vs what is PLANNED. If a feature is on the roadmap, say so
            - Pricing CTAs must respect LAUNCH_MODE: in waitlist mode, ALL CTAs should say "Join Waitlist" and link to the waitlist form (#waitlist), never "Start Free Trial" or link to /checkout
            - Add a disclaimer near tax/legal/financial tools: "informational tool, not professional advice"

            **Language consistency:**
            - The ENTIRE page must be in ONE language matching the target audience (from CLAUDE.md or product context)
            - If target audience speaks Portuguese → ALL copy in Portuguese (headings, CTAs, descriptions, FAQ, pricing, footer)
            - If target audience speaks English → ALL copy in English
            - NEVER mix languages on the same page — this looks unprofessional and confuses users
            - `<html lang="...">` MUST match the page content language (e.g. "pt" if Portuguese, "en" if English)
            - CTA buttons, form labels, error messages, and footer text must ALL match the chosen language

            **Responsive design:**
            - Mobile-first: all layouts work on 320px. Use `flex-col md:flex-row` for stacking
            - Padding: always `px-4 sm:px-6` on containers. Never let content touch screen edges
            - Touch targets: minimum `py-3 px-6` (48px) on buttons and interactive elements
            - Grids: `grid-cols-1 md:grid-cols-3` pattern. Never fixed widths on content

            ## SEO BASELINE (every page must have)
            - Unique title per page via Next.js `metadata` export: `{Page} | {CompanyName}` (max 60 chars)
            - Meta description per page (max 155 chars, include primary keyword)
            - `metadataBase` in root layout (without it, OG images break)
            - Open Graph tags: og:title, og:description, og:image, og:type
            - JSON-LD structured data: Organization + WebSite on layout, FAQPage if FAQ exists
            - `sitemap.ts` with all public routes. `robots.ts` blocking /api/* and auth pages
            - `<html lang="...">` matching target audience language (e.g. "pt" for Portuguese products)
            - One `<h1>` per page, logical heading hierarchy

            ## ACCESSIBILITY BASELINE
            - Semantic HTML: use `<nav>`, `<main>`, `<section>`, `<footer>`, `<button>`, `<a>` — never `<div onClick>`
            - Color contrast: minimum 4.5:1 for text. gray-500 on white is the floor — never lighter
            - Keyboard navigation: all interactive elements focusable, visible focus indicators
            - Form labels: every input has an associated `<label>` (htmlFor). Placeholder is NOT a label
            - Alt text: every `<img>` has meaningful alt. Decorative images use `alt=""`
            - ARIA: `aria-label` on icon-only buttons, `aria-expanded` on accordions

            ## PERFORMANCE
            - Use Server Components by default. Only add "use client" for components that need useState/useEffect/onClick
            - Use Next.js `<Image>` for all images with `sizes` prop. `priority` on above-fold images
            - Specify `width` and `height` on all images/media to prevent CLS
            - Use `next/font` for custom fonts (prevents FOUT and layout shift)
            - Keep client JS bundle minimal — no heavy libraries without justification

            ## feature_request — Build features from CEO plan
            1. Run PRE-FLIGHT stack detection (above)
            2. The active cycle plan is in PRODUCT CONTEXT above (cycle.ceo_plan).
            3. Check for existing work:
               - `git branch -r | grep hive/` — existing feature branches
               - `GH_TOKEN="$GH_PAT" gh pr list --state open --json number,title,headRefName`
            4. Read `ceo_plan.engineering_tasks`. ALSO check `engineering_tasks` from PRODUCT CONTEXT — these are from the company_tasks backlog.
               If ceo_plan has no engineering_tasks, use the backlog tasks instead. Pick the FIRST uncompleted task.
               IMPORTANT: Implement ONE task per run. You have limited turns.
            4b. If the task has an `id` from company_tasks, note it for tracking.
            5. Read the PRODUCT CONTEXT above. Use it to inform your implementation:
               - Check competitive_analysis for what competitors do (match or beat them)
               - Check the pricing model to build the right tier-gating structure
               - Check target_audience to get naming and UX right
               - Use the business domain to inform visual design choices (colors, language, metaphors)
            6. Create a feature branch: `git checkout -b hive/cycle-<N>-<task-id>`
            7. Implement the task following acceptance criteria AND the quality bars above
            8. Install dependencies if needed: `npm install`
            9. Build to verify — fix any errors. Use the correct build command from package.json
            10. Commit and push:
               ```bash
               git add -A && git commit -m "feat: <task summary>"
               git push -u origin hive/cycle-<N>-<task-id>
               ```
            11. Open a PR:
               `GH_TOKEN="$GH_PAT" gh pr create --title "feat: <task summary>" --body "Cycle <N>, Task <task-id>: <description>"`
            12. If the task has acceptance criteria, verify them before marking done.
            13. Output: { "pr_opened": true, "pr_number": N, "task_id": "<task_id>", "company": "${{ github.event.inputs.company_slug }}" }

            ## ops_escalation — Fix errors
            1. Run PRE-FLIGHT stack detection
            2. Check error details in the PAYLOAD above
            3. Diagnose and fix the issue in the current directory
            4. Build, commit, push

            ## deploy_drift — Fix stale deployments
            Check Vercel deployment status, trigger a redeploy if needed.

            ## Infrastructure operations
            You have access to the Vercel API via `$VERCEL_TOKEN` for infrastructure tasks:
            - **Enable Analytics**: `curl -s -X PATCH "https://api.vercel.com/v9/projects/${{ github.event.inputs.company_slug }}" -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" -d '{"analyticsEnabled":true,"speedInsightsEnabled":true}'`
            - **Trigger redeploy**: `curl -s -X POST "https://api.vercel.com/v13/deployments" -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" -d '{"name":"${{ github.event.inputs.company_slug }}","target":"production","gitSource":{"type":"github","org":"carloshmiranda","repo":"${{ github.event.inputs.company_slug }}","ref":"main"}}'`
            - **Set env vars**: `curl -s -X POST "https://api.vercel.com/v10/projects/${{ github.event.inputs.company_slug }}/env" -H "Authorization: Bearer $VERCEL_TOKEN" -H "Content-Type: application/json" -d '{"key":"VAR_NAME","value":"VALUE","target":["production"],"type":"encrypted"}'`
            - **List deployments**: `curl -s "https://api.vercel.com/v6/deployments?projectId=${{ github.event.inputs.company_slug }}&limit=5" -H "Authorization: Bearer $VERCEL_TOKEN"`
            Use these for ops tasks like enabling analytics, managing env vars, or triggering redeploys.

            RULES:
            - Implement ONE task per run, create a branch and open a PR
            - Always use `GH_TOKEN="$GH_PAT"` for gh commands
            - If you open a PR, output: { "pr_opened": true, "pr_number": N }
            - If you discover issues you can't fix in this run, add them to BACKLOG.md (read it first to avoid duplicates)
            - After completing work, move the relevant BACKLOG.md item to Done with today's date

      - name: Log result to Hive
        if: always()
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" \
            | jq -r '.value')
          STATUS="${{ steps.agent.outcome == 'success' && 'success' || 'failed' }}"
          curl -s -X POST "https://hive-phi.vercel.app/api/agents/log" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"company_slug\":\"${{ github.event.inputs.company_slug }}\",\"agent\":\"engineer\",\"action_type\":\"feature_request\",\"status\":\"$STATUS\",\"description\":\"Build workflow on company repo ($STATUS)\"}" || true

      - name: Chain dispatch to CEO
        if: always() && steps.agent.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.auth.outputs.gh_pat }}
        run: |
          set +e
          EXEC_FILE="${{ steps.agent.outputs.execution_file }}"
          if [ ! -f "$EXEC_FILE" ] || [ -z "$EXEC_FILE" ]; then
            EXEC_FILE="/home/runner/work/_temp/claude-execution-output.json"
          fi
          RESULT=$(jq -r '[.[] | select(.type == "assistant")] | last | [.message.content[] | select(.type == "text") | .text] | join("\n")' "$EXEC_FILE" 2>/dev/null || echo "{}")

          PR_NUM=$(echo "$RESULT" | grep -oP '"?pr_number"?\s*[:=]\s*"?\K\d+' | head -1 || echo "0")

          if echo "$RESULT" | grep -qiP '"?pr_opened"?\s*[:=]\s*"?true'; then
            curl -s -X POST "https://api.github.com/repos/carloshmiranda/hive/dispatches" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "{\"event_type\":\"ceo_review\",\"client_payload\":{\"source\":\"engineer\",\"company\":\"${{ github.event.inputs.company_slug }}\",\"pr_number\":${PR_NUM:-0}}}"
            echo "Dispatched CEO review for PR #${PR_NUM}"
          fi
